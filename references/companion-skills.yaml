    required: true
    introduced_in: 0.1.0
    description: "Multi-source research with citation tracking"

  # ── Discovery + skill management ────────────────────────────────────────
  - name: skills
    repo: broomva/skills
    category: meta
    required: true
    introduced_in: 0.1.0
    description: "Canonical reference of all available skills"

  - name: skills-showcase
    repo: broomva/skills-showcase
