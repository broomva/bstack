  # ── Design + frontend ───────────────────────────────────────────────────
  - name: arcan-glass
    repo: broomva/arcan-glass
    category: design
    required: false
    introduced_in: 0.1.0
    description: "Broomva trademark web styling system"

  - name: next-forge
    repo: broomva/next-forge
    category: platform
    required: false
    introduced_in: 0.1.0
