schema_version: 1
# Canonical companion-skill roster. The bstack substrate ships with these
# skills *checked* (SKILL.md preamble) and *installable* (bin/bstack-skills
# install) but does not bundle them — each skill ships from its own
# `broomva/<name>` repo and installs via `npx skills add broomva/<name>`.
#
# Conforms to schemas/companion-skills.v1.json. Validated by `bstack doctor`
# Section 11 (v0.7.0+).
#
# Adding a skill:
#   1. Append an entry below with name + repo + category.
#   2. Set `primitive` only if the skill embodies a specific bstack primitive.
#   3. Set `required: true` if the skill is mandatory for full substrate
#      compliance (default false — optional / domain-specific skills).
#   4. Bump bstack VERSION (additive — minor pre-1.0, patch otherwise).

skills:
  # ── Foundation: orchestration + governance modes ────────────────────────
  - name: autonomous
    repo: broomva/autonomous
    category: orchestration
    required: true
    introduced_in: 0.1.0
    description: "Canonical operating mode that fires the 20-reflex pipeline"

  - name: cross-review
    repo: broomva/cross-review
    category: safety
    primitive: P20
    required: true
    introduced_in: 0.2.0
    description: "Cross-model adversarial review gate"

  - name: role-x
    repo: broomva/role-x
    category: meta
    primitive: P17
    required: true
    introduced_in: 0.2.0
